events {
    worker_connections 1024;
}

http {
    client_max_body_size 100M;
    # Docker embedded DNS — avoids nginx crash when upstream containers restart
    resolver 127.0.0.11 valid=10s ipv6=off;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 80 default_server;
        server_name _ *.nip.io;  # 支持任何 nip.io 域名和直接 IP 访问
        
        # 开发环境的 CORS 设置
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;

        # Next.js 开发服务器
        location / {
            set $frontend_upstream frontend:3000;
            proxy_pass http://$frontend_upstream$request_uri;
            proxy_http_version 1.1;
            
            # Next.js HMR 配置
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # 开发环境特定配置
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 1800s;
            proxy_connect_timeout 1800s;

            # 开发环境下的 OPTIONS 请求处理
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization';
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }
        }

        # Next.js HMR 专用配置
        location /_next/webpack-hmr {
            set $frontend_upstream frontend:3000;
            proxy_pass http://$frontend_upstream$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
        }

        # Chat streaming (SSE) — long timeout like optimizations local setup
        location ~ ^/api/chat/[0-9]+/messages$ {
            set $backend_upstream backend:8000;
            proxy_pass http://$backend_upstream$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
            chunked_transfer_encoding off;
        }

        # 后端 API
        location /api {
            set $backend_upstream backend:8000;
            proxy_pass http://$backend_upstream$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            
            # 开发环境下的错误调试设置
            proxy_intercept_errors off;
            proxy_read_timeout 300s;
        }

        # API Documentation
        location /redoc {
            set $backend_upstream backend:8000;
            proxy_pass http://$backend_upstream$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /openapi.json {
            set $backend_upstream backend:8000;
            proxy_pass http://$backend_upstream$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

    }
}